<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/marca/sublogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="InGift3D — Impressão 3D sob medida" />
    <title>InGift — Impressão 3D</title>
    <script>
      (function () {
        const salvo = localStorage.getItem('ingift-tema');
        const prefereDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const usarDark = salvo === 'dark' || (salvo !== 'light' && prefereDark);
        if (usarDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
